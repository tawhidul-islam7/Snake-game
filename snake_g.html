<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Friendly Snake Game</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #1a1a1a; 
            color: white; 
            font-family: sans-serif;
            touch-action: none; /* Prevents screen scrolling while playing */
        }
        canvas { 
            border: 2px solid #fff; 
            background-color: #000; 
            max-width: 90vw;
            max-height: 70vh;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-gap: 10px;
        }
        .btn {
            width: 60px;
            height: 60px;
            background: #444;
            border: none;
            color: white;
            font-size: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        .btn:active { background: #666; }
        .up { grid-column: 2; }
        .left { grid-column: 1; }
        .down { grid-column: 2; }
        .right { grid-column: 3; }
        .score-board { margin-bottom: 10px; font-size: 20px; }
    </style>
</head>
<body>

<div class="score-board">Score: <span id="scoreVal">0</span></div>
<canvas id="gameCanvas" width="400" height="400"></canvas>

<div class="controls">
    <div class="btn up" onclick="setDirection('UP')">▲</div>
    <div class="btn left" onclick="setDirection('LEFT')">◀</div>
    <div class="btn down" onclick="setDirection('DOWN')">▼</div>
    <div class="btn right" onclick="setDirection('RIGHT')">▶</div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("scoreVal");

    let box = 20;
    let snake = [{ x: 10 * box, y: 10 * box }];
    let food = { 
        x: Math.floor(Math.random() * 19) * box, 
        y: Math.floor(Math.random() * 19) * box 
    };
    let score = 0;
    let d = "";

    // Keyboard controls
    document.addEventListener("keydown", (e) => {
        if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
        else if(e.keyCode == 38 && d != "DOWN") d = "UP";
        else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
        else if(e.keyCode == 40 && d != "UP") d = "DOWN";
    });

    // Mobile button controls
    function setDirection(newDir) {
        if(newDir == "LEFT" && d != "RIGHT") d = "LEFT";
        else if(newDir == "UP" && d != "DOWN") d = "UP";
        else if(newDir == "RIGHT" && d != "LEFT") d = "RIGHT";
        else if(newDir == "DOWN" && d != "UP") d = "DOWN";
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for(let i = 0; i < snake.length; i++) {
            ctx.fillStyle = (i == 0) ? "#00FF00" : "#008000";
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
        }

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, box, box);

        let snakeX = snake[0].x;
        let snakeY = snake[0].y;

        if( d == "LEFT") snakeX -= box;
        if( d == "UP") snakeY -= box;
        if( d == "RIGHT") snakeX += box;
        if( d == "DOWN") snakeY += box;

        if(snakeX == food.x && snakeY == food.y) {
            score++;
            scoreElement.innerHTML = score;
            food = { 
                x: Math.floor(Math.random() * 19) * box, 
                y: Math.floor(Math.random() * 19) * box 
            };
        } else {
            snake.pop();
        }

        let newHead = { x: snakeX, y: snakeY };

        // Game Over conditions
        if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
            clearInterval(game);
            alert("Game Over! Score: " + score);
            location.reload();
        }

        snake.unshift(newHead);
    }

    function collision(head, array) {
        for(let i = 0; i < array.length; i++) {
            if(head.x == array[i].x && head.y == array[i].y) return true;
        }
        return false;
    }

    // Speed: 150ms is slower than 100ms. Increase this number to slow it down more.
    let game = setInterval(draw, 150);
</script>
</body>
</html>
